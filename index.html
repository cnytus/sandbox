<!DOCTYPE html><html lang="tr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>BetFans</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
:root{color-scheme:light;--bg:#eef4fb;--panel:#fff;--panel2:#f7fafd;--line:#e1e9f2;--txt:#1f2d3d;--muted:#6b7c8f;--accent:#3b6fb0;--accent-soft:#d6e6f7;--good:#2e9e6b;--good-soft:#e3f5ec;--bad:#d9534f;--amber:#d9912f;--chip:#eef3f9;--shadow:0 1px 3px rgba(31,45,61,.06),0 6px 20px rgba(31,45,61,.06)}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--txt);font-size:14px;line-height:1.55}
header{padding:26px 24px 22px;background:linear-gradient(135deg,#4a7fc0,#3b6fb0 55%,#5a93cf);color:#fff;box-shadow:var(--shadow)}
header .inner{max-width:1180px;margin:0 auto}
.toprow{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
h1{margin:0 0 4px;font-size:22px;font-weight:800;letter-spacing:-.2px;display:flex;align-items:center;gap:9px}
h1 .tag{font-weight:500;font-size:13px;opacity:.85}
.sub{color:rgba(255,255,255,.92);font-size:13px;max-width:820px}
.disc{display:inline-block;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.3);color:#fff;padding:7px 12px;border-radius:9px;font-size:12px;margin-top:13px}
#lang{background:rgba(255,255,255,.18);color:#fff;border:1px solid rgba(255,255,255,.35);border-radius:8px;padding:6px 10px;font-size:13px;font-family:inherit;cursor:pointer}
#lang option{color:#1f2d3d}
.wrap{max-width:1180px;margin:22px auto;padding:0 24px;display:grid;grid-template-columns:1fr 360px;gap:20px}
@media(max-width:900px){.wrap{grid-template-columns:1fr}}
button{cursor:pointer;font-family:inherit;border:none;border-radius:9px;padding:9px 15px;font-size:13px;font-weight:600;transition:.15s}
.b1{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(59,111,176,.28)}.b1:hover{background:#33639c;transform:translateY(-1px)}
.b2{background:#fff;color:var(--accent);border:1px solid var(--line)}.b2:hover{background:var(--panel2)}
.bm{padding:6px 11px;font-size:12px}
.bar{display:flex;gap:9px;align-items:center;flex-wrap:wrap;margin-bottom:16px;background:var(--panel);padding:12px;border-radius:12px;border:1px solid var(--line);box-shadow:var(--shadow)}
select,input{background:#fff;border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:8px 11px;font-size:13px;font-family:inherit;transition:.15s}
select:focus,input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.legend{display:flex;gap:16px;flex-wrap:wrap;font-size:11.5px;color:var(--muted);margin:0 2px 16px;padding:11px 14px;background:var(--panel);border:1px solid var(--line);border-radius:10px}
.legend b{color:var(--txt)}
.dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;vertical-align:middle}
[dir=rtl] .dot{margin-right:0;margin-left:5px}
.match{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:16px;box-shadow:var(--shadow)}
.mh{display:flex;gap:9px;align-items:center;margin-bottom:12px}.mh input{flex:1;min-width:0;font-weight:600}.mh span{color:var(--muted);font-size:12px;font-weight:600}
.lr{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:9px}.lr input{width:100%}
label.f{display:block;font-size:11px;color:var(--muted);margin:0 0 4px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.src{display:inline-block;font-size:11px;font-weight:600;color:var(--muted);background:var(--chip);border:1px solid var(--line);border-radius:30px;padding:3px 10px;margin:2px 0 8px}
.src.good{color:#1d7a51;background:var(--good-soft);border-color:#bfe6d2}
.pick{background:var(--good-soft);border:1px solid #bfe6d2;color:#1d7a51;border-radius:10px;padding:8px 12px;font-size:12.5px;margin:6px 0 10px;font-weight:600}
.pick.none{background:var(--panel2);border-color:var(--line);color:var(--muted);font-weight:500}
table{width:100%;border-collapse:collapse;margin-top:4px}
th{text-align:left;font-size:10px;color:var(--muted);padding:7px 8px;border-bottom:2px solid var(--line);text-transform:uppercase;letter-spacing:.4px;font-weight:700}
[dir=rtl] th{text-align:right}
td{padding:8px;border-bottom:1px solid #eef3f8;font-size:13px}tr:last-child td{border-bottom:none}
.claudecol{font-weight:700;color:var(--accent)}
.mkt{color:var(--muted)}
.edge{font-weight:700}.edge.pos{color:var(--good)}.edge.neg{color:var(--bad)}.edge.flat{color:var(--muted)}
.vrow{background:var(--good-soft)}
.oc input{width:74px;padding:6px 8px}
.ap{background:var(--chip);border:1px solid var(--line);color:var(--accent);border-radius:8px;padding:5px 10px;font-size:11px;font-weight:600}.ap:hover{background:var(--accent-soft)}.ap.in{background:var(--good);color:#fff;border-color:var(--good)}
.sc{font-size:11.5px;color:var(--muted);margin-top:11px;padding-top:9px;border-top:1px dashed var(--line)}
.hint{font-size:11.5px;color:var(--muted);margin:4px 0 10px}
aside{position:sticky;top:18px;align-self:start}
.acwrap{margin-bottom:16px}
.acwrap h3{font-size:13px;margin:0 0 9px;color:var(--txt);font-weight:800}
.ac{border:1px solid var(--line);border-radius:12px;padding:13px;margin-bottom:11px;background:var(--panel);box-shadow:var(--shadow)}
.ac.g{border-top:3px solid var(--good)}.ac.b{border-top:3px solid var(--accent)}.ac.s{border-top:3px solid var(--amber)}
.ac-h{font-weight:800;font-size:13.5px;display:flex;justify-content:space-between;align-items:center}
.ac-h .hit{font-size:11px;font-weight:700;color:var(--muted)}
.ac-d{font-size:11px;color:var(--muted);margin:1px 0 9px}
.ac-leg{display:flex;justify-content:space-between;gap:8px;font-size:12px;padding:6px 0;border-bottom:1px solid #eef3f8}
.ac-leg small{display:block;color:var(--muted);font-size:10.5px;margin-top:1px}
.ac-leg b{color:var(--accent);white-space:nowrap}
.ac-tot{display:flex;justify-content:space-between;font-size:12px;margin-top:9px;padding-top:9px;border-top:1px dashed var(--line)}
.ac-tot b{color:var(--good)}
.cp{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;box-shadow:var(--shadow)}
.cp-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}.cp-h b{font-size:15px}
.pk{display:flex;justify-content:space-between;gap:8px;padding:10px;background:var(--panel2);border:1px solid var(--line);border-radius:10px;margin-bottom:8px;font-size:12.5px}.pk .x{color:var(--bad);cursor:pointer;font-weight:700;font-size:14px}.pk small{color:var(--muted);display:block;margin-top:2px}
.empty{color:var(--muted);text-align:center;padding:18px 10px;font-size:12px;background:var(--panel2);border-radius:10px;border:1px dashed var(--line)}
.st{display:flex;gap:9px;align-items:center;margin:14px 0}.st input{width:96px}
.tot{border-top:1px solid var(--line);margin-top:12px;padding-top:14px}.tl{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;font-size:13px}.tl span{color:var(--muted)}
.big{color:var(--good);font-size:22px;font-weight:800}
#msg{font-size:12px;color:var(--muted);margin-left:4px;font-weight:500}
</style></head><body>
<header><div class="inner">
<div class="toprow">
<div>
<h1><svg width="30" height="30" viewBox="0 0 64 64" style="vertical-align:-7px;border-radius:8px" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><defs><linearGradient id="bfh" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#bfe0ff"/><stop offset="1" stop-color="#9ff0c8"/></linearGradient></defs><rect width="64" height="64" rx="15" fill="rgba(255,255,255,.18)"/><rect x="13" y="37" width="8" height="14" rx="2.5" fill="#fff" opacity="0.85"/><rect x="27" y="29" width="8" height="22" rx="2.5" fill="#fff" opacity="0.92"/><rect x="41" y="21" width="8" height="30" rx="2.5" fill="#fff"/><circle cx="45" cy="14.5" r="6.6" fill="#fff" stroke="#1f6b4a" stroke-width="2.2"/><path d="M45 10.8l1.9 1.4-.72 2.25h-2.36l-.72-2.25z" fill="#1f6b4a"/></svg> BetFans <span class="tag" data-i18n="tag"></span></h1>
<div class="sub" data-i18n="sub"></div>
</div>
<select id="lang" onchange="setLang(this.value)">

</div>
<div class="disc" data-i18n="disc"></div>
</div></header>
<div class="wrap"><main>
<div class="bar">

    <option value="soccer_france_ligue_one" data-i18n="sel_ligue1"></option>

  <button class="b1" onclick="auto()" data-i18n="btnAuto"></button>
  <button class="b2 bm" onclick="addMatch()" data-i18n="btnManual"></button>
  <span id="msg"></span>
</div>
<div class="legend">
  <span data-i18n="legendModel"></span><span data-i18n="legendMarket"></span><span data-i18n="legendDiff"></span><span data-i18n="legendValue"></span>
</div>
<div id="matches"></div>
</main>
<aside>
<div class="acwrap" id="autocoupons"></div>
<div class="cp">
<div class="cp-h"><b data-i18n="coupon"></b><button class="b2 bm" onclick="clearC()" data-i18n="clear"></button></div>
<div id="picks"></div>
<div class="st"><label class="f" style="margin:0" data-i18n="stake"></label><input id="stake" type="number" value="100" oninput="onStake()"></div>
<div class="tot"><div class="tl"><span data-i18n="totalOdds"></span><b id="to">—</b></div>
<div class="tl"><span data-i18n="payout"></span><span class="big" id="po">—</span></div>
<div class="tl"><span data-i18n="profit"></span><b id="pf" style="color:var(--accent)">—</b></div>
<div class="tl"><span style="font-size:11px" data-i18n="holdChance"></span><span style="font-size:11px;color:var(--muted)" id="cpb">—</span></div></div>
<div class="hint" style="margin-top:10px" data-i18n="holdHint"></div>
</div></aside></div>

let lang='tr'; try{const sv=localStorage.getItem('lang'); if(sv&&T[sv])lang=sv;}catch(e){}
function t(k){return (T[lang]&&T[lang][k]!=null)?T[lang][k]:T.tr[k];}
function mkn(c){return (MKT[lang]&&MKT[lang][c])||MKT.tr[c];}
function applyStatic(){document.querySelectorAll('[data-i18n]').forEach(el=>{el.innerHTML=t(el.getAttribute('data-i18n'));});}
function setLang(v){if(!T[v])v='tr';lang=v;try{localStorage.setItem('lang',v);}catch(e){}document.documentElement.lang=v;document.documentElement.dir=(v==='ar')?'rtl':'ltr';document.getElementById('lang').value=v;applyStatic();render();rc();renderAutoCoupons();}
let matches=[],coupon=[],uid=1;
function poisson(k,l){let f=1;for(let i=2;i<=k;i++)f*=i;return Math.exp(-l)*Math.pow(l,k)/f;}
function dc(i,j,lh,la,rho){if(i===0&&j===0)return 1-lh*la*rho;if(i===0&&j===1)return 1+lh*rho;if(i===1&&j===0)return 1+la*rho;if(i===1&&j===1)return 1-rho;return 1;}
function calc(lh,la){const rho=-0.12;let cells=[],tot=0;for(let i=0;i<10;i++)for(let j=0;j<10;j++){let p=poisson(i,lh)*poisson(j,la);if(i<2&&j<2)p*=dc(i,j,lh,la,rho);cells.push([i,j,p]);tot+=p;}let ph=0,pd=0,pa=0,o=0,by=0,g=[];for(const c of cells){const p=c[2]/tot;if(c[0]>c[1])ph+=p;else if(c[0]==c[1])pd+=p;else pa+=p;if(c[0]+c[1]>2.5)o+=p;if(c[0]>=1&&c[1]>=1)by+=p;g.push({s:c[0]+"-"+c[1],p});}g.sort((a,b)=>b.p-a.p);return{"1":ph,"X":pd,"2":pa,"O":o,"U":1-o,"BY":by,"BN":1-by,top:g.slice(0,4)};}
function msg(x){document.getElementById('msg').textContent=x;}
function stakeVal(){const v=parseFloat(document.getElementById('stake').value);return v>0?v:100;}
async function auto(){const s=document.getElementById('sport').value;msg(t('msgAnalyzing'));try{const r=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'fixtures',sport:s})});const d=await r.json();if(d.error){msg('⚠️ '+d.error);return;}matches=(d.matches||[]).map(m=>({id:uid++,auto:true,home:m.home,away:m.away,lh:m.model_lh,la:m.model_la,mkt:Object.fromEntries(m.markets.map(x=>[x.code,x.mkt])),odds:Object.fromEntries(m.markets.filter(x=>x.odds).map(x=>[x.code,x.odds])),pick:m.pick,source:m.source}));let mw=(lang==='en'?' matches':lang==='de'?' Spiele':lang==='ar'?' مباراة':' maç');let note=d.form_count?(d.form_count+'/'+d.count+(lang==='tr'?' maç form verisiyle':lang==='en'?' matches with form data':lang==='de'?' Spiele mit Formdaten':' مباراة ببيانات الأداء')):t('msgNoForm');msg(d.count+mw+' · '+note);render();renderAutoCoupons();}catch(e){msg(t('msgError')+e);}}
function addMatch(){matches.push({id:uid++,auto:false,home:'',away:'',lh:1.3,la:1.1,mkt:{},odds:{}});render();}
function del(id){matches=matches.filter(m=>m.id!=id);coupon=coupon.filter(c=>c.mid!=id);render();rc();renderAutoCoupons();}
function upd(id,f,v){let m=matches.find(x=>x.id==id);if(f=='lh'||f=='la')m[f]=parseFloat(v)||0;else m[f]=v;rm(id);}
function uo(id,k,v){let m=matches.find(x=>x.id==id);m.odds[k]=parseFloat(v)||0;rm(id);let c=coupon.find(c=>c.mid==id&&c.mk==k);if(c){c.odds=m.odds[k]||0;rc();}renderAutoCoupons();}
function onStake(){rc();renderAutoCoupons();}
function marketOf(m,k){if(m.mkt&&m.mkt[k]!=null)return m.mkt[k];if(m.odds[k])return +(100/m.odds[k]).toFixed(1);return null;}
function render(){let e=document.getElementById('matches');if(!matches.length){e.innerHTML=`<div class="empty" style="padding:40px 0">${t('emptyMatches')}</div>`;return;}e.innerHTML=matches.map(m=>'<div class="match" id="m'+m.id+'"></div>').join('');matches.forEach(m=>rm(m.id));}
function rm(id){const m=matches.find(x=>x.id==id),b=document.getElementById('m'+id);if(!b)return;const r=calc(m.lh,m.la),hn=m.home||t('home'),an=m.away||t('away');
const rows=CODES.map(k=>{const mod=+(r[k]*100).toFixed(1),mkt=marketOf(m,k),edge=mkt!=null?+(mod-mkt).toFixed(1):null,od=m.odds[k]||0,val=edge!=null&&edge>=5,inc=coupon.some(c=>c.mid==id&&c.mk==k);
const ec=edge==null?'':(edge>=5?'pos':(edge<=-5?'neg':'flat')),es=edge==null?'—':(edge>0?'+':'')+edge;
return `<tr class="${val?'vrow':''}"><td>${mkn(k)}${val?' <span class="dot" style="background:var(--good)"></span>':''}</td><td class="claudecol">${mod}%</td><td class="mkt">${mkt!=null?mkt+'%':'—'}</td><td class="edge ${ec}">${es}</td><td class="oc"><input type="number" step="0.01" value="${od||''}" placeholder="${t('oddPh')}" oninput="uo(${id},'${k}',this.value)"></td><td><button class="ap ${inc?'in':''}" onclick="tp(${id},'${k}')">${inc?'✓':t('addToCoupon')}</button></td></tr>`;}).join('');
let pickHtml;
if(m.auto){pickHtml=m.pick?`<div class="pick">${t('pickPrefix')} <b>${mkn(m.pick.code)}</b> · BetFans ${m.pick.model}% ${t('vsMarket')} ${m.pick.mkt}% · ${t('diffWord')} +${m.pick.edge}%</div>`:`<div class="pick none">${t('noValue')}</div>`;}
else{const best=CODES.map(k=>{const mk=marketOf(m,k);return mk!=null?{k,edge:+(r[k]*100-mk).toFixed(1)}:null;}).filter(x=>x&&x.edge>=5).sort((a,b)=>b.edge-a.edge)[0];pickHtml=best?`<div class="pick">⭐ ${t('manualValueLbl')} <b>${mkn(best.k)}</b> · ${t('diffWord')} +${best.edge}%</div>`:`<div class="pick none">${t('manualHint')}</div>`;}
const src=m.auto?(m.source==='form'?`<span class="src good">${t('srcForm')}</span>`:`<span class="src">${t('srcMarket')}</span>`):`<span class="src">${t('srcManual')}</span>`;
b.innerHTML=`<div class="mh"><input value="${m.home}" placeholder="${t('home')}" oninput="upd(${id},'home',this.value)"><span>${t('vs')}</span><input value="${m.away}" placeholder="${t('away')}" oninput="upd(${id},'away',this.value)"><button class="b2 bm" onclick="del(${id})">✕</button></div><div class="lr"><div><label class="f">λ ${hn} (BetFans)</label><input type="number" step="0.05" value="${m.lh}" oninput="upd(${id},'lh',this.value)"></div><div><label class="f">λ ${an} (BetFans)</label><input type="number" step="0.05" value="${m.la}" oninput="upd(${id},'la',this.value)"></div></div>${src}${pickHtml}<table><thead><tr><th>${t('colBet')}</th><th>BetFans</th><th>${t('colMarket')}</th><th>${t('colDiff')}</th><th>${t('colOdds')}</th><th></th></tr></thead><tbody>${rows}</tbody></table><div class="sc">${t('topScores')} ${r.top.map(s=>s.s+' ('+(s.p*100).toFixed(0)+'%)').join(' · ')}</div>`;}
function tp(id,k){let i=coupon.findIndex(c=>c.mid==id&&c.mk==k);if(i>=0)coupon.splice(i,1);else{let m=matches.find(x=>x.id==id),r=calc(m.lh,m.la);coupon.push({mid:id,mk:k,home:m.home,away:m.away,prob:r[k],odds:m.odds[k]||0});}rm(id);rc();}
function clearC(){coupon=[];render();rc();}
function rc(){let e=document.getElementById('picks');if(!coupon.length){e.innerHTML=`<div class="empty">${t('emptyPick')}</div>`;['to','po','pf','cpb'].forEach(x=>document.getElementById(x).textContent='—');return;}e.innerHTML=coupon.map((c,i)=>{const lbl=(c.home||t('home'))+'-'+(c.away||t('away'))+' · '+mkn(c.mk);return '<div class="pk"><div>'+lbl+'<small>BetFans '+(c.prob*100).toFixed(0)+'% · '+t('colOdds')+' '+(c.odds?c.odds.toFixed(2):'—')+'</small></div><span class="x" onclick="rp('+i+')">✕</span></div>';}).join('');let st=stakeVal(),all=coupon.every(c=>c.odds>0),tt=1,pr=1;coupon.forEach(c=>{tt*=(c.odds||0);pr*=c.prob;});document.getElementById('to').textContent=all?tt.toFixed(2):t('oddPh');document.getElementById('po').textContent=all?(st*tt).toFixed(0)+' TL':'—';document.getElementById('pf').textContent=all?'+'+(st*tt-st).toFixed(0)+' TL':'—';document.getElementById('cpb').textContent='~'+(pr*100).toFixed(0)+'%';}
function rp(i){coupon.splice(i,1);render();rc();}
// ---- Otomatik kuponlar (Garanti / Dengeli / Sürpriz) ----
function legCandidates(){const out=[];matches.filter(m=>m.auto).forEach(m=>{const r=calc(m.lh,m.la);CODES.forEach(k=>{if(m.odds&&m.odds[k]){const model=r[k];const mkt=marketOf(m,k);const edge=mkt!=null?+(model*100-mkt).toFixed(1):0;out.push({mid:m.id,home:m.home||t('home'),away:m.away||t('away'),code:k,model,odds:m.odds[k],edge});}});});return out;}
function onePerMatch(cands,filter,score){const by={};cands.filter(filter).forEach(l=>{if(!by[l.mid]||score(l)>score(by[l.mid]))by[l.mid]=l;});return Object.values(by).sort((a,b)=>score(b)-score(a));}
function buildCoupons(){const all=legCandidates();
 const g=onePerMatch(all,l=>l.model>=0.55,l=>l.model).slice(0,3);
 const b=onePerMatch(all,l=>l.edge>=5&&l.model>=0.45,l=>l.model+l.edge/100).slice(0,4);
 let s=onePerMatch(all,l=>l.edge>=5&&l.odds>=2.2,l=>l.edge).slice(0,4);
 if(s.length<2)s=onePerMatch(all,l=>l.odds>=2.4&&l.model>=0.28,l=>l.odds).slice(0,4);
 return{g,b,s};}
function couponCard(title,desc,cls,legs){if(!legs||legs.length<2)return `<div class="ac ${cls}"><div class="ac-h">${title}</div><div class="ac-d">${desc}</div><div class="empty">${t('cInsuf')}</div></div>`;
 const st=stakeVal();let odds=1,pr=1;legs.forEach(l=>{odds*=l.odds;pr*=l.model;});
 const rows=legs.map(l=>`<div class="ac-leg"><span>${l.home} – ${l.away}<small>${mkn(l.code)}</small></span><b>${l.odds.toFixed(2)}</b></div>`).join('');
 return `<div class="ac ${cls}"><div class="ac-h">${title}<span class="hit">~${(pr*100).toFixed(0)}% ${t('cHit')}</span></div><div class="ac-d">${desc}</div>${rows}<div class="ac-tot"><span>${t('totalOdds')}: <b>${odds.toFixed(2)}</b></span><span>${st} TL → <b>${(st*odds).toFixed(0)} TL</b></span></div></div>`;}
function renderAutoCoupons(){const el=document.getElementById('autocoupons');const auto=matches.filter(m=>m.auto);if(!auto.length){el.innerHTML='';return;}const C=buildCoupons();el.innerHTML=`<h3>${t('acTitle')}</h3>`+couponCard(t('cG'),t('cGd'),'g',C.g)+couponCard(t('cB'),t('cBd'),'b',C.b)+couponCard(t('cS'),t('cSd'),'s',C.s);}
setLang(lang);
addMatch();
</script></body></html>
