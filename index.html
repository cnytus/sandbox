<!DOCTYPE html><html lang="tr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>BetFans</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
:root{color-scheme:light;--bg:#eef4fb;--panel:#fff;--panel2:#f7fafd;--line:#e1e9f2;--txt:#1f2d3d;--muted:#6b7c8f;--accent:#3b6fb0;--accent-soft:#d6e6f7;--good:#2e9e6b;--good-soft:#e3f5ec;--bad:#d9534f;--amber:#d9912f;--chip:#eef3f9;--shadow:0 1px 3px rgba(31,45,61,.06),0 6px 20px rgba(31,45,61,.06)}
*{box-sizing:border-box;scrollbar-width:none;-ms-overflow-style:none}
*::-webkit-scrollbar{display:none!important;width:0!important;height:0!important;background:transparent}
html,body{overflow-x:hidden}
body{margin:0;font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--txt);font-size:14px;line-height:1.55}
header{padding:26px 24px 22px;background:linear-gradient(135deg,#4a7fc0,#3b6fb0 55%,#5a93cf);color:#fff;box-shadow:var(--shadow)}
header .inner{max-width:1180px;margin:0 auto}
.toprow{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
h1{margin:0 0 4px;font-size:22px;font-weight:800;letter-spacing:-.2px;display:flex;align-items:center;gap:9px}
h1 .tag{font-weight:500;font-size:13px;opacity:.85}
.sub{color:rgba(255,255,255,.92);font-size:13px;max-width:820px}
.disc{display:inline-block;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.3);color:#fff;padding:7px 12px;border-radius:9px;font-size:12px;margin-top:13px}
#lang{background:rgba(255,255,255,.18);color:#fff;border:1px solid rgba(255,255,255,.35);border-radius:8px;padding:6px 10px;font-size:13px;font-family:inherit;cursor:pointer}
#lang option{color:#1f2d3d}
.wrap{max-width:1180px;margin:22px auto;padding:0 24px;display:grid;grid-template-columns:1fr 366px;gap:20px;align-items:start}
/* v8.5.1: grid blowout fix - grid items default to min-width:auto, so the match table's
   min-content width (~434px) was forcing MAIN wider than small viewports and clipping the
   right side. min-width:0 lets the 1fr track shrink; the table then fits/scrolls in-card. */
main,aside{min-width:0}
/* v8.5 mobile: coupons move ABOVE the match list; sticky/height limits disabled */
@media(max-width:900px){
.wrap{grid-template-columns:1fr}
aside{order:-1;position:static;max-height:none;overflow:visible}
main{order:2}
}
/* v8.5 mobile: stop right-side clipping - tighter paddings + tables scroll inside their card */
@media(max-width:600px){
.wrap{padding:0 10px;margin:12px auto;gap:14px}
header{padding:16px 12px 14px}
h1{font-size:18px}
.sub{font-size:12px}
.bar{padding:10px;gap:7px}
.match{padding:12px}
table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}
td,th{padding:6px 5px;font-size:12px}
.oc input{width:54px;padding:5px 6px}
.lr{gap:8px}
.hrow{font-size:11px;gap:5px}
.hm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
#viewHistory{padding:0 10px}
.legend{gap:8px;font-size:10.5px;padding:8px 10px}
}
button{cursor:pointer;font-family:inherit;border:none;border-radius:9px;padding:9px 15px;font-size:13px;font-weight:600;transition:.15s}
.b1{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(59,111,176,.28)}.b1:hover{background:#33639c;transform:translateY(-1px)}
.b2{background:#fff;color:var(--accent);border:1px solid var(--line)}.b2:hover{background:var(--panel2)}
.bm{padding:6px 11px;font-size:12px}
.bar{display:flex;gap:9px;align-items:center;flex-wrap:wrap;margin-bottom:16px;background:var(--panel);padding:12px;border-radius:12px;border:1px solid var(--line);box-shadow:var(--shadow)}
select,input{background:#fff;border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:8px 11px;font-size:13px;font-family:inherit;transition:.15s}
select:focus,input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.legend{display:flex;gap:16px;flex-wrap:wrap;font-size:11.5px;color:var(--muted);margin:0 2px 16px;padding:11px 14px;background:var(--panel);border:1px solid var(--line);border-radius:10px}
.legend b{color:var(--txt)}
.dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;vertical-align:middle}
[dir=rtl] .dot{margin-right:0;margin-left:5px}
.match{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:16px;box-shadow:var(--shadow)}
.mh{display:flex;gap:9px;align-items:center;margin-bottom:12px}.mh input{flex:1;min-width:0;font-weight:600}.mh span{color:var(--muted);font-size:12px;font-weight:600}
.lr{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:9px}.lr input{width:100%}
label.f{display:block;font-size:11px;color:var(--muted);margin:0 0 4px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.src{display:inline-block;font-size:11px;font-weight:600;color:var(--muted);background:var(--chip);border:1px solid var(--line);border-radius:30px;padding:3px 10px;margin:2px 0 8px}
.src.good{color:#1d7a51;background:var(--good-soft);border-color:#bfe6d2}
.pick{background:var(--good-soft);border:1px solid #bfe6d2;color:#1d7a51;border-radius:10px;padding:8px 12px;font-size:12.5px;margin:6px 0 10px;font-weight:600}
.pick.none{background:var(--panel2);border-color:var(--line);color:var(--muted);font-weight:500}
.pick.pred{background:var(--accent-soft);border-color:#bcd7f2;color:#28527e}
.prow{background:var(--accent-soft)}
table{width:100%;border-collapse:collapse;margin-top:4px}
th{text-align:left;font-size:10px;color:var(--muted);padding:7px 8px;border-bottom:2px solid var(--line);text-transform:uppercase;letter-spacing:.4px;font-weight:700}
[dir=rtl] th{text-align:right}
td{padding:8px;border-bottom:1px solid #eef3f8;font-size:13px}tr:last-child td{border-bottom:none}
.claudecol{font-weight:700;color:var(--accent)}
.mkt{color:var(--muted)}
.edge{font-weight:700}.edge.pos{color:var(--good)}.edge.neg{color:var(--bad)}.edge.flat{color:var(--muted)}
.vrow{background:var(--good-soft)}
.oc input{width:74px;padding:6px 8px}
.sc{font-size:11.5px;color:var(--muted);margin-top:11px;padding-top:9px;border-top:1px dashed var(--line)}
.hint{font-size:11.5px;color:var(--muted);margin:4px 0 10px}
aside{position:sticky;top:18px;align-self:start;max-height:calc(100vh - 36px);overflow-y:auto;overflow-x:hidden;scrollbar-width:none;-ms-overflow-style:none}
aside::-webkit-scrollbar{display:none;width:0;height:0}
.acwrap h3{font-size:15px;margin:0 0 4px;color:var(--txt);font-weight:800}
.acstake{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);margin:0 0 12px}
.acstake input{width:84px;padding:6px 9px;text-align:right;font-weight:700;color:var(--txt)}
.carousel{position:relative}
.cvp{overflow:hidden;border-radius:16px}
.ctrack{display:flex;transition:transform .28s ease}
.ctrack>.ac{flex:0 0 100%}
.carr{position:absolute;top:50px;z-index:3;background:#fff;border:1px solid var(--line);border-radius:50%;width:30px;height:30px;cursor:pointer;font-size:15px;line-height:1;box-shadow:var(--shadow);color:var(--accent);padding:0}
.carr.l{left:0}.carr.r{right:0}
.cnav{display:flex;justify-content:center;gap:7px;margin-top:11px}
.cdot{width:8px;height:8px;border-radius:50%;background:var(--line);cursor:pointer;transition:.15s}.cdot.on{background:var(--accent);transform:scale(1.25)}
.ac{border:1px solid var(--line);border-radius:16px;overflow:hidden;background:var(--panel);box-shadow:var(--shadow)}
.ac-top{padding:14px 16px;color:#fff;display:flex;justify-content:space-between;align-items:center;gap:8px}
.ac.g .ac-top{background:linear-gradient(135deg,#2e9e6b,#41b985)}
.ac.b .ac-top{background:linear-gradient(135deg,#3b6fb0,#5a93cf)}
.ac.s .ac-top{background:linear-gradient(135deg,#d9912f,#e0a64a)}
.ac-top .ttl{font-weight:800;font-size:15px;line-height:1.2}
.ac-top .ttl small{display:block;font-weight:500;font-size:10.5px;opacity:.92;margin-top:3px}
.ac-top .hitb{background:rgba(255,255,255,.22);border:1px solid rgba(255,255,255,.25);border-radius:30px;padding:5px 11px;font-size:11px;font-weight:800;white-space:nowrap;text-align:center}
.ac-body{padding:6px 16px}
.ac-leg{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid #eef3f8}
.ac-leg:last-child{border-bottom:none}
.ac-leg .tm{font-weight:700;font-size:12.5px}
.ac-leg .mc{display:inline-block;margin-top:4px;font-size:10.5px;color:var(--accent);background:var(--accent-soft);border-radius:20px;padding:2px 9px;font-weight:700}
.ac-leg .od{font-weight:800;color:var(--txt);font-size:15px}
.ac-foot{display:flex;justify-content:space-between;align-items:center;padding:13px 16px;background:var(--panel2);border-top:1px solid var(--line)}
.ac-foot .lo{font-size:11px;color:var(--muted)}.ac-foot .lo b{display:block;font-size:16px;color:var(--txt);margin-top:1px}
.ac-foot .ro{text-align:right}.ac-foot .ro .pay{font-size:19px;font-weight:800;color:var(--good)}.ac-foot .ro small{display:block;font-size:10.5px;color:var(--muted)}
.ac .empty2{padding:22px 16px;text-align:center;color:var(--muted);font-size:12px}
.empty{color:var(--muted);text-align:center;padding:18px 10px;font-size:12px;background:var(--panel2);border-radius:10px;border:1px dashed var(--line)}
#msg{font-size:12px;color:var(--muted);margin-left:4px;font-weight:500}
.hday{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:12px;box-shadow:var(--shadow)}
.hday-h{font-weight:700;font-size:12.5px;margin-bottom:8px;color:var(--txt)}.hday-h span{color:var(--muted);font-weight:600}
.hrow{display:grid;grid-template-columns:22px 1fr auto auto auto;gap:8px;align-items:center;font-size:12px;padding:5px 0;border-bottom:1px solid #eef3f8}
.hrow:last-child{border-bottom:none}
.hm{font-weight:600}.hp{color:var(--accent)}.hpr{color:var(--muted);font-size:11px}.hsc{color:var(--txt);font-weight:700}
.nav{display:flex;gap:7px;margin-top:15px}
.tab{background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.28);border-radius:9px;padding:8px 16px;font-weight:700;font-size:13px}
.tab.on{background:#fff;color:var(--accent);border-color:#fff}
#viewHistory{max-width:1180px;margin:22px auto;padding:0 24px}
.hpwrap{max-width:920px}
.hpbar{display:flex;gap:12px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.hpbar h2{margin:0;font-size:18px;font-weight:800}
.hpsum{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 16px;font-size:13px;box-shadow:var(--shadow);margin-bottom:16px;display:flex;gap:18px;flex-wrap:wrap}
.hpsum b{color:var(--accent)}
</style></head><body>

let matches=[],uid=1,acIndex=0,lastParamsVersion=null,lastEdgeThresholdPct=5;
const FAMILY={"1":"1x2","X":"1x2","2":"1x2","O":"ou","U":"ou","BY":"btts","BN":"btts"};
function poisson(k,l){let f=1;for(let i=2;i<=k;i++)f*=i;return Math.exp(-l)*Math.pow(l,k)/f;}
function dcf(i,j,lh,la,rho){if(i===0&&j===0)return 1-lh*la*rho;if(i===0&&j===1)return 1+lh*rho;if(i===1&&j===0)return 1+la*rho;if(i===1&&j===1)return 1-rho;return 1;}
function calc(lh,la){const rho=-0.12;let cells=[],tot=0;for(let i=0;i<10;i++)for(let j=0;j<10;j++){let p=poisson(i,lh)*poisson(j,la);if(i<2&&j<2)p*=dcf(i,j,lh,la,rho);cells.push([i,j,p]);tot+=p;}let ph=0,pd=0,pa=0,o=0,by=0,g=[];for(const c of cells){const p=c[2]/tot;if(c[0]>c[1])ph+=p;else if(c[0]==c[1])pd+=p;else pa+=p;if(c[0]+c[1]>2.5)o+=p;if(c[0]>=1&&c[1]>=1)by+=p;g.push({s:c[0]+"-"+c[1],p});}g.sort((a,b)=>b.p-a.p);return{"1":ph,"X":pd,"2":pa,"O":o,"U":1-o,"BY":by,"BN":1-by,top:g.slice(0,4)};}
function msg(x){document.getElementById('msg').textContent=x;}
function stakeVal(){const v=parseFloat(document.getElementById('stake').value);return v>0?v:100;}
async function auto(){const s=document.getElementById('sport').value;msg(t('msgAnalyzing'));try{const r=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'fixtures',sport:s})});const d=await r.json();if(d.error){msg('⚠️ '+d.error);return;}lastParamsVersion=d.params_version||null;lastEdgeThresholdPct=d.edge_threshold_pct||5;matches=(d.matches||[]).map(m=>m.live?({id:uid++,auto:true,live:true,home:m.home,away:m.away,commence:m.commence,mkt:{},odds:{}}):({id:uid++,auto:true,home:m.home,away:m.away,lh:m.model_lh,la:m.model_la,commence:m.commence,mkt:Object.fromEntries(m.markets.map(x=>[x.code,x.mkt])),odds:Object.fromEntries(m.markets.filter(x=>x.odds).map(x=>[x.code,x.odds])),pick:m.pick,source:m.source}));let mw=(lang==='en'?' matches':lang==='de'?' Spiele':lang==='ar'?' مباراة':' maç');let note=d.form_count?(d.form_count+'/'+d.count+(lang==='tr'?' maç form verisiyle':lang==='en'?' matches with form data':lang==='de'?' Spiele mit Formdaten':' مباراة ببيانات الأداء')):t('msgNoForm');msg(d.count+mw+' · '+note+' · v'+lastParamsVersion+' · edge≥'+lastEdgeThresholdPct+'%');render();acIndex=0;renderAutoCoupons();savePicks(s);settleThenHistory(s);}catch(e){msg(t('msgError')+e);}}
function onSport(){auto();} // v8.1: switching sport re-fetches matches (auto() also settles + refreshes history)
function addMatch(){matches.push({id:uid++,auto:false,home:'',away:'',lh:1.3,la:1.1,mkt:{},odds:{}});render();}
function del(id){matches=matches.filter(m=>m.id!=id);render();renderAutoCoupons();}
function upd(id,f,v){let m=matches.find(x=>x.id==id);if(f=='lh'||f=='la')m[f]=parseFloat(v)||0;else m[f]=v;rm(id);renderAutoCoupons();}
function uo(id,k,v){let m=matches.find(x=>x.id==id);m.odds[k]=parseFloat(v)||0;rm(id);renderAutoCoupons();}
function onStake(){renderAutoCoupons();}
function marketOf(m,k){if(m.mkt&&m.mkt[k]!=null)return m.mkt[k];if(m.odds[k])return +(100/m.odds[k]).toFixed(1);return null;}
function render(){let e=document.getElementById('matches');if(!matches.length){e.innerHTML=`<div class="empty" style="padding:40px 0">${t('emptyMatches')}</div>`;return;}e.innerHTML=matches.map(m=>'<div class="match" id="m'+m.id+'"></div>').join('');matches.forEach(m=>rm(m.id));}
function betfansPred(m,r){
 if(m.auto&&m.pick)return {code:m.pick.code,model:m.pick.model,mkt:m.pick.mkt,edge:m.pick.edge,kelly_pct:m.pick.kelly_pct,value:true};
 const bv=CODES.map(k=>{const mk=marketOf(m,k);return mk!=null?{k,edge:+(r[k]*100-mk).toFixed(1),mk}:null;}).filter(x=>x&&x.edge>=5).sort((a,b)=>b.edge-a.edge)[0];
 if(bv)return {code:bv.k,model:+(r[bv.k]*100).toFixed(1),mkt:bv.mk,edge:bv.edge,value:true};
 const arr=CODES.map(k=>({k,p:r[k],od:m.odds[k]||0}));const w=arr.filter(x=>x.od>0);const pool=w.length?w:arr;pool.sort((a,b)=>b.p-a.p);const top=pool[0];
 return {code:top.k,model:+(top.p*100).toFixed(1),odds:top.od||null,value:false};}
function rm(id){const m=matches.find(x=>x.id==id),b=document.getElementById('m'+id);if(!b)return;
if(m.live){b.innerHTML=`<div class="mh"><input value="${m.home}" disabled><span>${t('vs')}</span><input value="${m.away}" disabled></div><div class="pick pred">${t('liveLocked')}</div>`;return;}
const r=calc(m.lh,m.la),hn=m.home||t('home'),an=m.away||t('away');
const pred=betfansPred(m,r),predCode=pred.code,isVP=pred.value;
const rows=CODES.map(k=>{const mod=+(r[k]*100).toFixed(1),mkt=marketOf(m,k),edge=mkt!=null?+(mod-mkt).toFixed(1):null,od=m.odds[k]||0,val=edge!=null&&edge>=5,isP=k===predCode;
const ec=edge==null?'':(edge>=5?'pos':(edge<=-5?'neg':'flat')),es=edge==null?'—':(edge>0?'+':'')+edge;
const mark=isP?(isVP?'⭐ ':'🎯 '):'';
return `<tr class="${val?'vrow':(isP?'prow':'')}"><td>${mark}${mkn(k)}${val?' <span class="dot" style="background:var(--good)"></span>':''}</td><td class="claudecol">${mod}%</td><td class="mkt">${mkt!=null?mkt+'%':'—'}</td><td class="edge ${ec}">${es}</td><td class="oc"><input type="number" step="0.01" value="${od||''}" placeholder="${t('oddPh')}" oninput="uo(${id},'${k}',this.value)"></td></tr>`;}).join('');
let pickHtml;
if(pred.value){pickHtml=`<div class="pick">${t('pickPrefix')} <b>${mkn(pred.code)}</b> · BetFans ${pred.model}%${pred.mkt!=null?` ${t('vsMarket')} ${pred.mkt}%`:''} · ${t('diffWord')} +${pred.edge}%${pred.kelly_pct?` · Kelly %${pred.kelly_pct}`:''}</div>`;}
else{pickHtml=`<div class="pick pred">🎯 ${t('predPrefix')} <b>${mkn(pred.code)}</b> · ${pred.model}%${pred.odds?` · ${t('colOdds')} ${(+pred.odds).toFixed(2)}`:''}</div>`;}
const src=m.auto?(m.source==='form'?`<span class="src good">${t('srcForm')}</span>`:`<span class="src">${t('srcMarket')}</span>`):`<span class="src">${t('srcManual')}</span>`;
b.innerHTML=`<div class="mh"><input value="${m.home}" placeholder="${t('home')}" oninput="upd(${id},'home',this.value)"><span>${t('vs')}</span><input value="${m.away}" placeholder="${t('away')}" oninput="upd(${id},'away',this.value)"><button class="b2 bm" onclick="del(${id})">✕</button></div><div class="lr"><div><label class="f">λ ${hn} (BetFans)</label><input type="number" step="0.05" value="${m.lh}" oninput="upd(${id},'lh',this.value)"></div><div><label class="f">λ ${an} (BetFans)</label><input type="number" step="0.05" value="${m.la}" oninput="upd(${id},'la',this.value)"></div></div>${src}${pickHtml}<table><thead><tr><th>${t('colBet')}</th><th>BetFans</th><th>${t('colMarket')}</th><th>${t('colDiff')}</th><th>${t('colOdds')}</th></tr></thead><tbody>${rows}</tbody></table><div class="sc">${t('topScores')} ${r.top.map(s=>s.s+' ('+(s.p*100).toFixed(0)+'%)').join(' · ')}</div>`;}

function legCandidates(){const out=[];matches.filter(m=>m.auto&&!m.live).forEach(m=>{const r=calc(m.lh,m.la);CODES.forEach(k=>{if(m.odds&&m.odds[k]){const model=r[k];const mkt=marketOf(m,k);const edge=mkt!=null?+(model*100-mkt).toFixed(1):0;out.push({mid:m.id,home:m.home||t('home'),away:m.away||t('away'),code:k,model,odds:m.odds[k],edge});}});});return out;}
function onePerMatch(cands,filter,score){const by={};cands.filter(filter).forEach(l=>{if(!by[l.mid]||score(l)>score(by[l.mid]))by[l.mid]=l;});return Object.values(by).sort((a,b)=>score(b)-score(a));}
function buildCoupons(){const all=legCandidates();
 const g=onePerMatch(all,l=>l.model>=0.55&&l.odds<=1.9,l=>l.model).slice(0,3);
 let b=onePerMatch(all,l=>l.odds>=1.5&&l.odds<=2.7,l=>l.model+l.edge/100).slice(0,3);
 if(b.length<2)b=onePerMatch(all,l=>l.model>=0.4&&l.model<=0.62,l=>l.model).slice(0,3);
 let s=onePerMatch(all,l=>l.edge>=3&&l.odds>=2.0&&l.odds<=4.5&&l.model>=0.30,l=>l.edge).slice(0,3);
 if(s.length<2)s=onePerMatch(all,l=>l.edge>=2&&l.odds>=1.9&&l.odds<=4.5&&l.model>=0.32,l=>l.edge).slice(0,3);
 return{g,b,s};}
function couponCard(title,desc,cls,legs){
 if(!legs||legs.length<2)return `<div class="ac ${cls}"><div class="ac-top"><div class="ttl">${title}<small>${desc}</small></div></div><div class="empty2">${t('cInsuf')}</div></div>`;
 const st=stakeVal();let odds=1,pr=1;legs.forEach(l=>{odds*=l.odds;pr*=l.model;});
 const rows=legs.map(l=>`<div class="ac-leg"><div><div class="tm">${l.home} – ${l.away}</div><span class="mc">${mkn(l.code)}</span></div><div class="od">${l.odds.toFixed(2)}</div></div>`).join('');
 return `<div class="ac ${cls}"><div class="ac-top"><div class="ttl">${title}<small>${desc}</small></div><div class="hitb">~${(pr*100).toFixed(0)}%<br>${t('cHit')}</div></div><div class="ac-body">${rows}</div><div class="ac-foot"><div class="lo">${t('totalOdds')}<b>${odds.toFixed(2)}</b></div><div class="ro"><div class="pay">${(st*odds).toFixed(0)} TL</div><small>${st} TL · ${t('ret')}</small></div></div></div>`;}
function renderAutoCoupons(){const el=document.getElementById('autocoupons');const auto=matches.filter(m=>m.auto);if(!auto.length){el.innerHTML=`<div class="empty">${t('acEmpty')}</div>`;return;}const C=buildCoupons();const cards=[couponCard(t('cG'),t('cGd'),'g',C.g),couponCard(t('cB'),t('cBd'),'b',C.b),couponCard(t('cS'),t('cSd'),'s',C.s)];if(acIndex>2)acIndex=0;el.innerHTML=`<div class="carousel"><button class="carr l" onclick="acMove(-1)">‹</button><div class="cvp"><div class="ctrack" id="ctrack" style="transform:translateX(-${acIndex*100}%)">${cards.join('')}</div></div><button class="carr r" onclick="acMove(1)">›</button></div><div class="cnav">${[0,1,2].map(i=>`<span class="cdot ${i===acIndex?'on':''}" onclick="acSet(${i})"></span>`).join('')}</div>`;}
function acMove(d){acIndex=(acIndex+d+3)%3;const tr=document.getElementById('ctrack');if(tr)tr.style.transform='translateX(-'+acIndex*100+'%)';document.querySelectorAll('.cdot').forEach((x,i)=>x.classList.toggle('on',i===acIndex));}
function acSet(i){acIndex=i;acMove(0);}
// ---- Geçmiş / kayıt ----
function savePicks(sport){try{const picks=matches.filter(m=>m.auto&&m.commence&&!m.live&&(new Date(m.commence)-Date.now())<8*86400000).map(m=>{ // v8.7: don't book picks >8 days out - odds drift makes them stale by kickoff
let leg=m.pick;if(!leg){const r=calc(m.lh,m.la);let best=null;CODES.forEach(k=>{if(m.odds&&m.odds[k]){const mp=r[k];if(!best||mp>best.mp)best={code:k,mp,od:m.odds[k]};}});if(best)leg={code:best.code,model:+(best.mp*100).toFixed(1),odds:best.od};}if(!leg)return null;const mktProb=(leg.mkt!=null?leg.mkt:(m.mkt&&m.mkt[leg.code]!=null?m.mkt[leg.code]:null));const edgePct=(leg.edge!=null?leg.edge:(mktProb!=null?+(leg.model-mktProb).toFixed(1):null));return{match_date:(m.commence||'').slice(0,10),home:m.home,away:m.away,market:leg.code,model_prob:(leg.model/100).toFixed(4),odds:leg.odds||'',is_value:!!m.pick,sport,lambda_home:m.lh,lambda_away:m.la,market_prob:mktProb!=null?(mktProb/100).toFixed(4):'',edge_pct:edgePct!=null?edgePct:'',family:FAMILY[leg.code]||'',params_version:lastParamsVersion||''};}).filter(Boolean);if(!picks.length)return;fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'save',picks})}).catch(()=>{});}catch(e){}}
async function settleThenHistory(sport){try{await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'settle'})});}catch(e){}const hs=document.getElementById('histSport');if(hs&&sport)hs.value=sport;refreshHistory(sport);}
async function refreshHistory(sport){const sp=sport?sport:null;try{const r=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'history',sport:sp})});const d=await r.json();renderHistory(d.rows||[]);}catch(e){renderHistory([]);}}
function renderHistory(rows){const el=document.getElementById('history'),sum=document.getElementById('histSum');if(!el)return;
 if(!rows||!rows.length){el.innerHTML=`<div class="empty" style="padding:32px 0">${t('histNone')}</div>`;if(sum)sum.innerHTML='';return;}
 let H=0,S=0;rows.forEach(r=>{if(r.result){S++;if(r.result==='hit')H++;}});const miss=S-H,pend=rows.length-S,acc=S?Math.round(H/S*100):0;
 const clvRows=rows.filter(r=>r.clv_pct!=null);const avgClv=clvRows.length?(clvRows.reduce((a,r)=>a+ +r.clv_pct,0)/clvRows.length):null;
 if(sum)sum.innerHTML=`<span>✅ ${H}</span><span>❌ ${miss}</span><span>⏳ ${pend}</span><span>${t('histAcc')}: <b>${S?acc+'%':'—'}</b></span>`+(avgClv!=null?`<span>CLV: <b>${avgClv>0?'+':''}${avgClv.toFixed(1)}%</b></span>`:'');
 const byd={};rows.forEach(r=>{const k=r.match_date||'-';(byd[k]=byd[k]||[]).push(r);});const dates=Object.keys(byd).sort().reverse();let h='';
 dates.forEach(dt=>{const items=byd[dt];const hit=items.filter(x=>x.result==='hit').length,st2=items.filter(x=>x.result).length;h+=`<div class="hday"><div class="hday-h">${dt} <span>${st2?('· '+hit+'/'+st2+' '+t('cHit')):''}</span></div>`+items.map(r=>{const s=r.result==='hit'?'✅':(r.result==='miss'?'❌':'⏳');const clv=r.clv_pct!=null?` · CLV ${(+r.clv_pct>0?'+':'')}${(+r.clv_pct).toFixed(1)}%`:'';return `<div class="hrow"><span>${s}</span><span class="hm">${r.home} – ${r.away}</span><span class="hp">${mkn(r.market)}</span><span class="hpr">${r.model_prob?(+r.model_prob*100).toFixed(0)+'%':''}${r.odds?' · '+(+r.odds).toFixed(2):''}${clv}</span><span class="hsc">${r.actual_score||''}</span></div>`;}).join('')+`</div>`;});el.innerHTML=h;}
setLang(lang);
renderAutoCoupons();
// v8.1: every page open auto-loads matches AND settles finished games (auto() chains:
// fixtures -> savePicks -> settle -> history refresh). Returning to the tab after >60s
// re-runs the same refresh so scores/results stay current without a manual click.
auto();
let lastAutoRefresh=Date.now();
document.addEventListener('visibilitychange',()=>{ if(!document.hidden && Date.now()-lastAutoRefresh>60000){ lastAutoRefresh=Date.now(); auto(); } });
</script></body></html>
